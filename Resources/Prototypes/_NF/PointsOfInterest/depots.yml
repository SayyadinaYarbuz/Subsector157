- type: pointOfInterest # 157
  id: CargoDepot # 157
  parent: BasePOI # 157
  name: Cargo Depot # 157
  minimumDistance: 4000 # 157
  maximumDistance: 5000 # 157
  spawnGroup: CargoDepot # 157
  gridPath: /Maps/_NF/POI/cargodepot.yml # 157
  addComponents: # 157
  - type: IFF # 157
    color: "#37C837" # 157
  - type: ProtectedGrid # 157
    preventArtifactTriggers: true # 157
  - type: SolarPoweredGrid # 157
    trackOnInit: true # 157
    doNotCull: true # 157

